# Prometheus scrape config — tails the OTel Collector's prometheus
# exposition port and stores the resulting time series for the smoke
# test's ~1h retention window.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
